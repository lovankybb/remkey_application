spring:
  application:
    name: remkey
#    connect to db
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      url: ${REDIS_URL}


  #      config jpa for postgres
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect


  flyway:
    enabled: true
    locations: classpath:db/migration

    baseline-on-migrate: true


resend:
  api-key: ${RESEND_API_KEY}


server:
  port: 8080
  servlet:
    context-path: /api/v1/remkey


#Json web token
jwt:
  secret-key: ${JWT_SECRETE_KEY}
  valid-duration: ${JWT_VALID_DURATION} #days
  refreshable:  ${JWT_REFRESHABLE} #days


app:
  static-path:
    card:
      image: ${IMAGES_PATH}
      sound: ${SOUNDS_PATH}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_SECRET_KEY}
  sec:
    otp-verifier:
      valid-duration: 5 #minutes
      refreshable:  1 #minutes
      request-limit: 5 #times per day
    cors:
      endpoint: ${FRONT_END_ADDRESS}
    rate-limit:
      capacity: 50 #times per minute
      refill: 50 #times per minute





# payment handle params.
vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  secret-key: ${VNPAY_SECRETE_KEY}
  pay-url: ${VNPAY_PAY_URL}
  return-url: ${VNPAY_RETURN_URL}
  expire-time: ${VNPAY_EXPIRE_TIME}

momo:
  partner-code: ${MOM0_PARTNER_CODE}
  access-key: ${MOMO_ACCESS_KEY}
  secret-key: ${MOMO_SECRET_KEY}
  return-url: ${MOMO_API_URL}
  api-url:  ${MOMO_API_URL}
  notify-url: ${MOMO_NOTIFY_URL}
